server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: sme-backend

  # ========================
  # DATABASE (PostgreSQL)
  # ========================
  datasource:
    url: jdbc:postgresql://pg-1af9dcb0-nguyennguyen2712005-9fc5.b.aivencloud.com:12250/defaultdb?sslmode=require
    username: avnadmin
    password: AVNS_t86EbqYwkwtZ_kkFQCE
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SME-HikariPool

  # ========================
  # JPA / HIBERNATE
  # ========================
  jpa:
    hibernate:
      ddl-auto: validate         # Flyway quản lý schema, Hibernate chỉ validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
          batch_size: 50
        order_inserts: true
        order_updates: true
        envers:
          audit_table_suffix: _audit
          store_data_at_delete: true

  # ========================
  # FLYWAY (Database Migration)
  # ========================
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  # ========================
  # REDIS
  # ========================
  data:
    redis:
      host: valkey-1641f89e-nguyennguyen2712005-9fc5.b.aivencloud.com
      port: 12251
      password: AVNS__g_VCNnWEU9GVR3f6oz
      ssl:
        enabled: true
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # ========================
  # SPRING BATCH
  # ========================
  batch:
    job:
      enabled: false             # Tắt auto-run khi khởi động
    jdbc:
      initialize-schema: always  # Tạo schema batch tự động

  # ========================
  # SPRING AI - Dùng Gemini qua chuẩn OpenAI (Không cần thẻ Visa GCP)
  # ========================
# ========================
  # SPRING AI - Dùng Gemini qua chuẩn OpenAI
  # ========================
# ========================
  # SPRING AI - Dùng Gemini qua chuẩn OpenAI (Không cần thẻ Visa GCP)
  # ========================
  ai:
    openai:
      api-key: AIzaSyAVK7jmcc-wf2FInC6e2CPoXWak7eu7BRY  # (Lưu ý: Nên dùng biến môi trường ${GEMINI_API_KEY} cho bảo mật)
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      chat:
        completions-path: /chat/completions  # BẮT BUỘC THÊM: Ghi đè path mặc định của Spring AI
        options:
          model: gemini-2.5-flash
          temperature: 0.25
      embedding:
        embeddings-path: /embeddings         # BẮT BUỘC THÊM: Ghi đè path mặc định của Spring AI
        options:
          model: gemini-embedding-001 
          dimensions: 768
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768           # Gemini embedding dimensions
        initialize-schema: false  # Flyway quản lý

cloudinary:
  cloud-name: "dubppfegu"
  api-key: "831542688114817"
  api-secret: "FZcuzdfvLGboS8q_kogSr1-QeU8"
  # ========================
  # WEBSOCKET (STOMP)
  # ========================
  websocket:
    message-broker:
      application-destination-prefix: /app
      simple-broker-destination-prefix: /topic,/queue

  # ========================
  # FILE UPLOAD
  # ========================
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# ========================
# APPLICATION CUSTOM CONFIG
# ========================
app:
  # JWT Settings
  jwt:
    secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
    expiration-ms: 86400000      # 24 giờ
    refresh-expiration-ms: 604800000  # 7 ngày

  # CORS
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173"
    allowed-methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    allowed-headers: "*"
    allow-credentials: true

  # Business Logic
  business:
    low-stock-threshold: 10       # Cảnh báo tồn kho thấp
    dead-stock-days: 90           # Số ngày không bán = Hàng tồn chậm
    loyalty-points-per-vnd: 1000  # Cứ 1000đ = 1 điểm
    loyalty-points-redeem-value: 100
    silver-threshold: 500         # 500 điểm = Silver
    gold-threshold: 2000          # 2000 điểm = Gold

  # File Storage (Local / S3)
  storage:
    type: local                   # local | s3
    local-path: ./uploads
    base-url: http://localhost:8080/api/files

  # AI RAG
  ai:
    chunk-size: 800
    chunk-overlap: 100
    top-k-results: 5

# ========================
# LOGGING
# ========================
logging:
  level:
    root: INFO
    sme.backend: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.springframework.ai: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"

# ========================
# MANAGEMENT (Actuator)
# ========================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized